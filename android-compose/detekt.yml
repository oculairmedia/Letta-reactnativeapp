build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
    ignoreAnnotated:
      - "Composable"
      - "Inject"
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 15
  ComplexCondition:
    threshold: 5
  CyclomaticComplexMethod:
    threshold: 20

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - "Exception"
      - "RuntimeException"
      - "Throwable"
    allowedExceptionNameRegex: "_|(ignore|expected).*"
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - "CancellationException"
  TooGenericExceptionThrown:
    active: true

empty-blocks:
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: "_|(ignore|expected).*"
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - "Composable"
      - "Test"
  TopLevelPropertyNaming:
    active: true
    constantPattern: "[A-Z][A-Za-z0-9_]*"
    propertyPattern: "[A-Za-z][A-Za-z0-9_]*"

potential-bugs:
  CastToNullableType:
    active: true
  DoubleMutabilityForCollection:
    active: true
  ExitOutsideMain:
    active: false
  HasPlatformType:
    active: true
  IgnoredReturnValue:
    active: false
  UnnecessaryNotNullOperator:
    active: true
  UnnecessarySafeCall:
    active: true
  UselessPostfixExpression:
    active: true

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 140
    excludeCommentStatements: true
  ReturnCount:
    max: 4
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
    allowedNames: "(_|ignored|expected|serialVersionUID)"
  WildcardImport:
    active: true
    excludeImports:
      - "java.util.*"
      - "kotlinx.coroutines.*"
      - "androidx.compose.ui.*"
      - "androidx.compose.foundation.*"
      - "androidx.compose.material3.*"
      - "androidx.compose.material.icons.*"
      - "com.letta.mobile.data.model.*"

coroutines:
  GlobalCoroutineUsage:
    active: true
  SuspendFunSwallowedCancellation:
    active: true
