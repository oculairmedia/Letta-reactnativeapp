name: Android CI

on:
  push:
    branches: [kotlin-compose-migration]
    paths: ["android-compose/**"]
  pull_request:
    branches: [kotlin-compose-migration]
    paths: ["android-compose/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :core:testDebugUnitTest :app:testDebugUnitTest --no-daemon

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android-compose/app/build/outputs/apk/debug/*.apk
