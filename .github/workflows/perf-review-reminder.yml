name: Quarterly Performance Score Review Reminder

on:
  schedule:
    - cron: "17 14 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create quarterly review issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          month=$(date -u +%m)
          year=$(date -u +%Y)
          quarter=$(( (10#$month - 1) / 3 + 1 ))
          body=$(cat <<EOF
          ## Quarterly performance review due

          Quarter: ${year}-Q${quarter}

          - Review rubric: https://developer.android.com/topic/performance/app-score
          - Update log: https://github.com/${GH_REPO}/blob/main/docs/performance/score-history.md
          - Source bead: letta-mobile-o7ob.4.3

          ### Expected actions

          - [ ] Run the quarterly App Performance Score review
          - [ ] Append a new quarter entry to `docs/performance/score-history.md`
          - [ ] File any uncovered deltas as new beads under `letta-mobile-o7ob`
          - [ ] Link the new bead IDs back into the quarterly entry
          EOF
          )
          gh issue create \
            --title "Quarterly App Performance Score review due" \
            --body "$body"
